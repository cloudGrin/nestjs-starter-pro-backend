# Prometheus 配置文件

global:
  scrape_interval: 15s        # 默认抓取间隔
  evaluation_interval: 15s    # 规则评估间隔
  external_labels:
    cluster: 'home'
    environment: 'production'

# 告警配置（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# 规则文件（可选）
# rule_files:
#   - "alerts/*.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # home Server 应用监控
  - job_name: 'home-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'home-server'
          version: '1.0.0'
    # 抓取超时时间
    scrape_timeout: 10s
    # 健康检查
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: app:3000

  # Node Exporter（如果需要主机级别监控）
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
