apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-server-ingress
  namespace: default
  annotations:
    # 使用nginx ingress controller
    kubernetes.io/ingress.class: nginx

    # SSL证书配置（使用cert-manager自动签发）
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # CORS配置
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"

    # 速率限制（防止DDoS）
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # 文件上传大小限制
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # 超时设置
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # WebSocket支持
    nginx.ingress.kubernetes.io/websocket-services: home-server-service
spec:
  tls:
    - hosts:
        - api.example.com  # 替换为你的域名
      secretName: home-tls-secret  # TLS证书Secret名称
  rules:
    - host: api.example.com  # 替换为你的域名
      http:
        paths:
          # 健康检查端点（不经过认证）
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: home-server-service
                port:
                  number: 80

          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: home-server-service
                port:
                  number: 80

          # Prometheus指标端点
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: home-server-service
                port:
                  number: 80

          # API路由
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-server-service
                port:
                  number: 80
