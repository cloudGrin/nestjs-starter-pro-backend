apiVersion: v1
kind: Service
metadata:
  name: home-server-service
  namespace: default
  labels:
    app: home-server
spec:
  type: ClusterIP  # 使用ClusterIP，通过Ingress暴露
  selector:
    app: home-server
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  sessionAffinity: None
