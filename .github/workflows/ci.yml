name: CI Pipeline

# 触发条件
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# 并发控制：同一分支的多次提交只运行最新的workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # 代码检查和测试
  # ==========================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 服务依赖
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: home_test
          MYSQL_USER: home_test
          MYSQL_PASSWORD: test_password
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 代码格式检查
        run: pnpm lint

      - name: 类型检查
        run: pnpm build

      - name: 运行单元测试
        run: pnpm test
        env:
          NODE_ENV: test

      - name: 运行E2E测试
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3307
          DB_USERNAME: home_test
          DB_PASSWORD: test_password
          DB_DATABASE: home_test
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          REDIS_PASSWORD: ''
          JWT_SECRET: test-secret-key
          JWT_REFRESH_SECRET: test-refresh-secret-key

      - name: 生成测试覆盖率报告
        run: pnpm test:cov
        continue-on-error: true

      - name: 上传覆盖率报告到Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ==========================================
  # 安全扫描
  # ==========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 运行Trivy漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 上传Trivy扫描结果到GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 依赖安全审计
        run: |
          npm audit --production || true
        continue-on-error: true
