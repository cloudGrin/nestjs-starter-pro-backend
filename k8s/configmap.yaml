apiVersion: v1
kind: ConfigMap
metadata:
  name: home-config
  namespace: default
data:
  # 数据库配置
  db.host: "mysql-service"
  db.port: "3306"
  db.database: "home"

  # Redis配置
  redis.host: "redis-service"
  redis.port: "6379"
  redis.db: "0"

  # 应用配置
  api.prefix: "api"
  api.version: "v1"
  log.level: "info"

  # CORS配置
  cors.origin: "*"
  cors.credentials: "true"
