apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-uploads-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany  # 多个Pod可以同时读写
  storageClassName: standard  # 根据你的K8s集群调整
  resources:
    requests:
      storage: 10Gi  # 请求10GB存储空间

