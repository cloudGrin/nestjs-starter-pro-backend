apiVersion: v1
kind: Secret
metadata:
  name: home-secret
  namespace: default
type: Opaque
# 注意：这里的值需要base64编码
# 使用命令: echo -n "your-value" | base64
# 生产环境建议使用 Sealed Secrets 或 External Secrets Operator
stringData:
  # 数据库凭证（明文，K8s会自动编码）
  db.username: "home"
  db.password: "change-me-in-production"

  # Redis密码
  redis.password: "change-me-in-production"

  # JWT密钥（务必在生产环境更换为强随机字符串）
  jwt.secret: "change-me-to-a-strong-random-string-in-production"
  jwt.refresh-secret: "change-me-to-another-strong-random-string-in-production"

---
# 使用已编码的值（推荐在生产环境使用）
# apiVersion: v1
# kind: Secret
# metadata:
#   name: home-secret
#   namespace: default
# type: Opaque
# data:
