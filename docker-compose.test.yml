version: '3.8'

services:
  # MySQL数据库 - 用于E2E测试
  mysql-test:
    image: mysql:8.0
    container_name: home-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: test_root_password
      MYSQL_DATABASE: home_test
      MYSQL_USER: home_test
      MYSQL_PASSWORD: test_password
    ports:
      - "3307:3306"  # 使用3307端口避免与本地MySQL冲突
    volumes:
      - mysql-test-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_root_password"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - home-test-network

volumes:
  mysql-test-data:
    driver: local

networks:
  home-test-network:
    driver: bridge
