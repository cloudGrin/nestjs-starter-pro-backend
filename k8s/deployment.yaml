apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-server
  namespace: default
  labels:
    app: home-server
    version: v1.0.0
spec:
  replicas: 3  # 3个副本实现高可用
  selector:
    matchLabels:
      app: home-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # 确保滚动更新期间服务可用
  template:
    metadata:
      labels:
        app: home-server
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      # 使用非root用户运行
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # 初始化容器（等待数据库和Redis就绪）
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z mysql-service 3306; do echo waiting for mysql; sleep 2; done;']
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done;']

      containers:
        - name: home-server
          image: home-server:latest  # 替换为你的镜像仓库地址
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # 环境变量配置
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"

            # 数据库配置（从ConfigMap）
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: home-config
                  key: db.host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: home-config
                  key: db.port
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: home-config
                  key: db.database

            # 数据库密码（从Secret）
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: home-secret
                  key: db.username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-secret
                  key: db.password

            # Redis配置
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: home-config
                  key: redis.host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: home-config
                  key: redis.port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-secret
                  key: redis.password

            # JWT密钥（从Secret）
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: home-secret
                  key: jwt.secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: home-secret
                  key: jwt.refresh-secret

          # 资源限制
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          # 存活探针（Liveness Probe）
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # 就绪探针（Readiness Probe）
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3

          # 挂载卷
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: uploads
              mountPath: /app/uploads

      volumes:
        - name: logs
          emptyDir: {}
        - name: uploads
          persistentVolumeClaim:
            claimName: home-uploads-pvc

      # 节点亲和性（可选，确保Pod分布在不同节点）
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - home-server
                topologyKey: kubernetes.io/hostname
